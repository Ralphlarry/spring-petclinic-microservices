# Argo CD Application — deploys the petclinic Helm chart via GitOps.
# Apply once (after Argo CD is installed): kubectl apply -f argocd-application.yaml -n argocd
#
# Assumes the chart lives at helm/petclinic in the app repo. Adjust repoURL /
# targetRevision / path to match where you commit the chart.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Ralphlarry/spring-petclinic-microservices.git
    targetRevision: feature/aws-eks-production-deployment   # later: main
    path: helm/petclinic
    helm:
      valueFiles:
        - values.yaml
      # CI updates the image tag here (or commits it into values.yaml directly):
      # parameters:
      #   - name: global.imageTag
      #     value: <git-sha>
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
