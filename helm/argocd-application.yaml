# Argo CD Application — deploys the petclinic Helm chart via GitOps.
# Apply once (after Argo CD is installed): kubectl apply -f helm/argocd-application.yaml -n argocd
#
# Chart lives at helm/petclinic in this repo. Adjust repoURL / targetRevision / path if you move it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Ralphlarry/spring-petclinic-microservices.git
    targetRevision: feature/aws-eks-production-deployment   # later: main
    path: helm/petclinic
    helm:
      valueFiles:
        - values.yaml
      # CI bumps the tag here (or commits it into values.yaml directly):
      # parameters:
      #   - name: global.imageTag
      #     value: <git-sha>
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic
  # FIRST ADOPTION = MANUAL sync (no `automated` block yet). The app is already
  # running from raw kubectl apply; apply this Application, review the diff in the
  # UI, Sync once by hand, confirm Healthy. Expect a one-time rolling restart of
  # all 7 services (chart adds labels + reconciles the image tag) — that's normal.
  #
  # After a clean manual sync: add the automated block below AND switch CI to
  # helm/ci/deploy-gitops.yml (stop kubectl apply) so CI and Argo don't fight.
  #   automated:
  #     prune: true
  #     selfHeal: true
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
