# Argo CD Application — deploys the petclinic Helm chart via GitOps.
# Apply once (after Argo CD is installed): kubectl apply -f helm/argocd-application.yaml -n argocd
#
# Chart lives at helm/petclinic in this repo. Adjust repoURL / targetRevision / path if you move it.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: petclinic
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Ralphlarry/spring-petclinic-microservices.git
    targetRevision: feature/aws-eks-production-deployment   # later: main
    path: helm/petclinic
    helm:
      valueFiles:
        - values.yaml
      # CI bumps the tag here (or commits it into values.yaml directly):
      # parameters:
      #   - name: global.imageTag
      #     value: <git-sha>
  destination:
    server: https://kubernetes.default.svc
    namespace: petclinic
  # (History: first adoption was a one-time MANUAL sync of the already-running app.)
  # Automation ENABLED (CI cutover done 2026-06-24): Argo CD auto-syncs on git
  # changes, prunes removed resources, and self-heals manual drift. The old
  # kubectl-apply pipeline has been replaced by the GitOps deploy.yml.
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
