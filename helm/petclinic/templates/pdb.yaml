{{- $root := . -}}
{{- range $name, $svc := .Values.services }}
{{- $pdb := $svc.pdb | default dict }}
{{- if $pdb.enabled }}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ $name }}
  namespace: {{ $root.Values.global.namespace }}
  labels:
    app: {{ $name }}
    {{- include "petclinic.labels" $root | nindent 4 }}
spec:
  # Only meaningful when the service runs >= 2 replicas (HPA-managed), otherwise
  # a PDB can block node drains. Enable PDB only alongside HPA.
  maxUnavailable: {{ $pdb.maxUnavailable | default 1 }}
  selector:
    matchLabels:
      app: {{ $name }}
{{- end }}
{{- end }}
