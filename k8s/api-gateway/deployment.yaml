apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-gateway
  namespace: petclinic

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-gateway

  template:
    metadata:
      labels:
        app: api-gateway

    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: api-gateway

        image: 524338476341.dkr.ecr.eu-central-1.amazonaws.com/petclinic-api-gateway:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8080

        resources:
          requests:
            cpu: 100m
            memory: 512Mi

          limits:
            cpu: 500m
            memory: 512Mi

        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10

        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 120
          periodSeconds: 20
