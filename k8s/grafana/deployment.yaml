apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: petclinic

spec:
  replicas: 1

  selector:
    matchLabels:
      app: grafana

  template:
    metadata:
      labels:
        app: grafana

    spec:
      containers:
      - name: grafana

        image: grafana/grafana:latest

        ports:
        - containerPort: 3000

        resources:
          requests:
            cpu: 100m
            memory: 256Mi

          limits:
            cpu: 500m
            memory: 512Mi

        env:
        - name: GF_SECURITY_ADMIN_USER
          value: admin

        - name: GF_SECURITY_ADMIN_PASSWORD
          value: admin

        volumeMounts:
        - name: datasource
          mountPath: /etc/grafana/provisioning/datasources

      volumes:
      - name: datasource
        configMap:
          name: grafana-datasource
