# Karpenter NodePool (API v1). Defines WHAT nodes Karpenter may provision and when
# to consolidate. Karpenter watches for unschedulable (Pending) pods — e.g. the
# HPA scale-up of customers/vets/visits/api-gateway — and launches nodes to fit them.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: default
spec:
  template:
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: kubernetes.io/os
          operator: In
          values: ["linux"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]        # add "spot" to mix in cheaper capacity
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium", "t3a.medium", "t3.large", "t3a.large"]
      expireAfter: 720h                  # recycle nodes after 30d (patching)
  limits:
    cpu: "16"                            # hard ceiling so a runaway HPA can't blow up cost
    memory: 32Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 1m                 # bin-pack / remove underused nodes
